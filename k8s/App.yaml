apiVersion: v1
kind: Service
metadata:
  name: app
  namespace: user-apps
spec:
  selector:
    app: application
  ports:
    - port: 9434
      targetPort: 9434
  type: NodePort
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: user-apps
type: Opaque
stringData:
  REDIS_ADDR: "redis.user-apps.svc.cluster.local:6379"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: application
  namespace: user-apps
spec:
  replicas: 3
  selector:
    matchLabels:
      app: application
  template:
    metadata:
      labels:
        app: application
    spec:
      containers:
        - name: application
          image: ali23uk/userprofile-service:ae7ddf2398936852c8760ee800374528409bb597
          ports:
            - containerPort: 9434
          envFrom:
            - secretRef:
                name: app-secret