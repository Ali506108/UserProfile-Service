name: CI.yml
on:
  push:
    branches:
      - master
    paths: [ 'app/**', 'Dockerfile' ]
  workflow_dispatch:
    

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/userprofile-service:${{ github.sha }}

      - name: Update K8s manifests
        run: |
          echo "=== Проверяем что файл есть ==="
          ls -la k8s/
          echo "=== Текущий image в yaml ==="
          cat k8s/app.yaml | grep image:
          sed -i "s|image: .*/userprofile-service:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/userprofile-service:${{ github.sha }}|g" k8s/app.yaml
          echo "=== Новый image в yaml ==="
          cat k8s/app.yaml | grep image:

      - name: Commit update manifest
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add k8s/app.yaml
          git diff --staged --quiet || git commit -m "ci: update image tag to ${{ github.sha }}"
          git push
