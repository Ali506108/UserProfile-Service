name: CI.yml
on:
  push:
    branches:
      - master
    paths: [ 'app/**', 'Dockerfile' ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ali23uk/application:${{github.sha}}

      - name: Update K8s manifests
        run: |
          sed -i "s|image: ali23uk/application:.*|image: ali23uk/application:${{ github.sha }}|g" k8s/app.yaml

      - name: Commit update manifest
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add k8s/app.yaml
          git commit -m "ci: update image tag to ${{ github.sha }}" || exit 0
          git push
