version: '3.9'

services:
  app:
    container_name: application
    build:
      dockerfile: Dockerfile
    env_file:
      -  .env
    ports:
      - "9434:9434"
    networks:
      - app

  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app

networks:
  app:

volumes:
  redis_data:
      driver: local